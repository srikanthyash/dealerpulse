name: dealer_kpi_model
description: Semantic model for Dealer KPIs - Sales, Performance, Cash Management
database: dealer_db
tables:
- name: vw_gross_profit_margin
  table: dealer_db.vw_gross_profit_margin
  description: Monthly gross profit margin and revenue metrics by dealer
  columns:
  - name: dealer_name
    type: string
    role: dimension
    description: Name of the dealer
    synonyms:
    - dealer
    - distributor name
  - name: period_month
    type: date
    role: time_dimension
    description: First day of the reporting month
  - name: period_year
    type: bigint
    role: time_dimension
    description: Year of the reporting period
  - name: total_revenue
    type: double
    role: fact
    description: Total revenue for the period
    synonyms:
    - revenue
    - sales
    - turnover
  - name: total_cogs
    type: double
    role: fact
    description: Total cost of goods sold
    synonyms:
    - cogs
    - cost of sales
  - name: gross_profit_margin_pct
    type: double
    role: fact
    description: Gross profit margin as a percentage
    synonyms:
    - gross margin
    - GPM
    - profit margin
    - profitability
  verified_queries:
  - name: gross_profit_margin_overview
    description: Gross profit margin for all dealers ordered by dealer and period
    question_templates:
    - show gross profit margin
    - what is the gross profit margin
    - gross margin by dealer
    - GPM analysis
    - profitability by dealer
    sql: "SELECT dealer_name, period_year, period_month,\n       total_revenue, total_cogs, gross_profit_margin_pct\nFROM\
      \ dealer_db.vw_gross_profit_margin ORDER BY dealer_name, period_year DESC, period_month DESC\n"
  - name: gross_profit_margin_with_performance
    description: Gross profit margin joined with repair turnaround for cross-KPI view
    question_templates:
    - compare margin and repair performance
    - gross margin vs turnaround time
    sql: "SELECT m.dealer_name, m.period_year, m.period_month,\n       m.gross_profit_margin_pct, t.avg_turnaround_hours\n\
      FROM dealer_db.vw_gross_profit_margin AS m LEFT JOIN dealer_db.vw_average_repair_turnaround_time AS t\n  ON m.dealer_name\
      \ = t.dealer_name\n AND m.period_year  = t.period_year\n AND m.period_month = cast(t.period_month as bigint)\nORDER\
      \ BY m.dealer_name, m.period_year DESC, m.period_month DESC\n"
