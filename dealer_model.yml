- name: VW_AVERAGE_REPAIR_TURNAROUND_TIME
  base_table:
    database: dealer_db
    schema: dealer_db
    table: VW_AVERAGE_REPAIR_TURNAROUND_TIME
  description: 'Average Repair Turnaround Time — columns: DEALER_NAME, PERIOD_YEAR, PERIOD_MONTH, PERIOD_START_DATE, AVG_TURNAROUND_HOURS,
    SERVICE_ORDERS_COUNT'
  dimensions:
  - name: DEALER_NAME
    expr: DEALER_NAME
    description: Dealer Name
    label: Dealer Name
    synonyms: &id001
    - dealer
    - distributor name
  time_dimensions:
  - name: PERIOD_YEAR
    expr: PERIOD_YEAR
    description: Period Year
    label: Period Year
    time_granularity: year
  - name: PERIOD_MONTH
    expr: PERIOD_MONTH
    description: Period Month
    label: Period Month
    time_granularity: month
  - name: PERIOD_START_DATE
    expr: PERIOD_START_DATE
    description: Period Start Date
    label: Period Start Date
    time_granularity: day
  facts:
  - name: AVG_TURNAROUND_HOURS
    expr: AVG_TURNAROUND_HOURS
    description: Avg Turnaround Hours
    label: Avg Turnaround Hours
    synonyms:
    - repair TAT
    - service turnaround
    default_aggregation: sum
  - name: SERVICE_ORDERS_COUNT
    expr: SERVICE_ORDERS_COUNT
    description: Service Orders Count
    label: Service Orders Count
    default_aggregation: sum
