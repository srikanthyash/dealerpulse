  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  dl.PRODUCT_CATEGORY,\n  ROUND(SUM(dl.ON_HAND_STOCK), 2) AS ON_HAND_STOCK,\n  ROUND(SUM(dl.RESERVED_STOCK),\
    \ 2) AS RESERVED_STOCK,\n  ROUND(SUM(dl.TOTAL_DEMAND), 2) AS TOTAL_DEMAND,\n  ROUND(AVG(dl.STOCK_AVAILABILITY_PCT), 2)\
    \ AS STOCK_AVAILABILITY_PCT\nFROM dealer_db.dealer_db.VW_STOCK_AVAILABILITY_DEALER dl\nGROUP BY dl.DEALER_NAME, dl.PRODUCT_CATEGORY\n\
    ORDER BY dl.DEALER_NAME;"
- name: stock_availability_dealer_with_performance
  question: Show Stock Availability Dealer with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    dl.PRODUCT_CATEGORY,\n    ROUND(SUM(dl.ON_HAND_STOCK), 2) AS ON_HAND_STOCK,\n\
    \    ROUND(SUM(dl.RESERVED_STOCK), 2) AS RESERVED_STOCK,\n    ROUND(SUM(dl.TOTAL_DEMAND), 2) AS TOTAL_DEMAND,\n    ROUND(AVG(dl.STOCK_AVAILABILITY_PCT),\
    \ 2) AS STOCK_AVAILABILITY_PCT,\n  FROM dealer_db.dealer_db.VW_STOCK_AVAILABILITY_DEALER dl\n  GROUP BY dl.DEALER_NAME,\
    \ dl.PRODUCT_CATEGORY\n),\nperf AS (\n  SELECT DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n    SUM(TOTAL_REVENUE)\
    \ AS total_revenue\n  FROM dealer_db.dealer_db.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n)\nSELECT b.*, ROUND(p.avg_margin,2)\
    \ AS avg_gross_margin_pct, ROUND(p.total_revenue,0) AS total_revenue\nFROM base b\nLEFT JOIN perf p ON b.DEALER_NAME =\
    \ p.DEALER_NAME\nORDER BY p.total_revenue DESC NULLS LAST;"
- name: transaction_lineage_overview
  question: Show me transaction lineage. Where are my transaction lineage? Transaction Lineage overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.TRANSACTION_ID,\n  dl.DEALER_NAME,\n  dl.PRODUCT_CATEGORY,\n  dl.PRODUCT_DESC,\n  dl.ORDER_FLAG,\n  dl.DELIVERY_FLAG,\n\
    \  dl.INVOICE_FLAG,\n  dl.PAID_FLAG,\n  dl.INVOICE_STATUS,\n  dl.WARRANTY_FLAG,\n  dl.WARRANTY_STATUS,\n  ROUND(SUM(dl.LEAD_TIME_DAYS),\
    \ 2) AS LEAD_TIME_DAYS,\n  ROUND(SUM(dl.INVOICE_AMOUNT), 2) AS INVOICE_AMOUNT\nFROM dealer_db.dealer_db.VW_TRANSACTION_LINEAGE\
    \ dl\nGROUP BY dl.TRANSACTION_ID, dl.DEALER_NAME, dl.PRODUCT_CATEGORY, dl.PRODUCT_DESC, dl.ORDER_FLAG, dl.DELIVERY_FLAG,\
    \ dl.INVOICE_FLAG, dl.PAID_FLAG, dl.INVOICE_STATUS, dl.WARRANTY_FLAG, dl.WARRANTY_STATUS\nORDER BY dl.TRANSACTION_ID;"
- name: transaction_lineage_with_performance
  question: Show Transaction Lineage with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.TRANSACTION_ID,\n    dl.DEALER_NAME,\n    dl.PRODUCT_CATEGORY,\n    dl.PRODUCT_DESC,\n\
    \    dl.ORDER_FLAG,\n    dl.DELIVERY_FLAG,\n    dl.INVOICE_FLAG,\n    dl.PAID_FLAG,\n    dl.INVOICE_STATUS,\n    dl.WARRANTY_FLAG,\n\
    \    dl.WARRANTY_STATUS,\n    ROUND(SUM(dl.LEAD_TIME_DAYS), 2) AS LEAD_TIME_DAYS,\n    ROUND(SUM(dl.INVOICE_AMOUNT), 2)\
    \ AS INVOICE_AMOUNT,\n  FROM dealer_db.dealer_db.VW_TRANSACTION_LINEAGE dl\n  GROUP BY dl.TRANSACTION_ID, dl.DEALER_NAME,\
    \ dl.PRODUCT_CATEGORY, dl.PRODUCT_DESC, dl.ORDER_FLAG, dl.DELIVERY_FLAG, dl.INVOICE_FLAG, dl.PAID_FLAG, dl.INVOICE_STATUS,\
    \ dl.WARRANTY_FLAG, dl.WARRANTY_STATUS\n),\nperf AS (\n  SELECT DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n\
    \    SUM(TOTAL_REVENUE) AS total_revenue\n  FROM dealer_db.dealer_db.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n\
    )\nSELECT b.*, ROUND(p.avg_margin,2) AS avg_gross_margin_pct, ROUND(p.total_revenue,0) AS total_revenue\nFROM base b\n\
    LEFT JOIN perf p ON b.DEALER_NAME = p.DEALER_NAME\nORDER BY p.total_revenue DESC NULLS LAST;"
