verified_queries:
- name: average_repair_turnaround_time_overview
  question: Show me average repair turnaround time. Where are my average repair turnaround time? Average Repair Turnaround
    Time overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.AVG_TURNAROUND_HOURS), 2) AS AVG_TURNAROUND_HOURS,\n  ROUND(SUM(dl.SERVICE_ORDERS_COUNT),\
    \ 2) AS SERVICE_ORDERS_COUNT\nFROM dealer_db.dealer_db.VW_AVERAGE_REPAIR_TURNAROUND_TIME dl\nGROUP BY dl.DEALER_NAME\n\
    ORDER BY dl.DEALER_NAME;"
- name: average_repair_turnaround_time_with_performance
  question: Show Average Repair Turnaround Time with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    ROUND(SUM(dl.AVG_TURNAROUND_HOURS), 2) AS AVG_TURNAROUND_HOURS,\n\
    \    ROUND(SUM(dl.SERVICE_ORDERS_COUNT), 2) AS SERVICE_ORDERS_COUNT,\n  FROM dealer_db.dealer_db.VW_AVERAGE_REPAIR_TURNAROUND_TIME\
    \ dl\n  GROUP BY dl.DEALER_NAME\n),\nperf AS (\n  SELECT DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n\
    \    SUM(TOTAL_REVENUE) AS total_revenue\n  FROM dealer_db.dealer_db.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n\
    )\nSELECT b.*, ROUND(p.avg_margin,2) AS avg_gross_margin_pct, ROUND(p.total_revenue,0) AS total_revenue\nFROM base b\n\
    LEFT JOIN perf p ON b.DEALER_NAME = p.DEALER_NAME\nORDER BY p.total_revenue DESC NULLS LAST;"
- name: backorder_incidence_overview
  question: Show me backorder incidence. Where are my backorder incidence? Backorder Incidence overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(AVG(dl.BACKORDER_INCIDENCE_PCT), 2) AS BACKORDER_INCIDENCE_PCT,\n  ROUND(SUM(dl.TOTAL_ORDER_ITEMS),\
    \ 2) AS TOTAL_ORDER_ITEMS,\n  ROUND(SUM(dl.BACKORDERED_ITEMS), 2) AS BACKORDERED_ITEMS\nFROM dealer_db.dealer_db.VW_BACKORDER_INCIDENCE\
    \ dl\nGROUP BY dl.DEALER_NAME\nORDER BY dl.DEALER_NAME;"
- name: backorder_incidence_with_performance
  question: Show Backorder Incidence with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    ROUND(AVG(dl.BACKORDER_INCIDENCE_PCT), 2) AS BACKORDER_INCIDENCE_PCT,\n\
    \    ROUND(SUM(dl.TOTAL_ORDER_ITEMS), 2) AS TOTAL_ORDER_ITEMS,\n    ROUND(SUM(dl.BACKORDERED_ITEMS), 2) AS BACKORDERED_ITEMS,\n\
    \  FROM dealer_db.dealer_db.VW_BACKORDER_INCIDENCE dl\n  GROUP BY dl.DEALER_NAME\n),\nperf AS (\n  SELECT DEALER_NAME,\n\
    \    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n    SUM(TOTAL_REVENUE) AS total_revenue\n  FROM dealer_db.dealer_db.VW_GROSS_PROFIT_MARGIN\n\
    \  GROUP BY DEALER_NAME\n)\nSELECT b.*, ROUND(p.avg_margin,2) AS avg_gross_margin_pct, ROUND(p.total_revenue,0) AS total_revenue\n\
    FROM base b\nLEFT JOIN perf p ON b.DEALER_NAME = p.DEALER_NAME\nORDER BY p.total_revenue DESC NULLS LAST;"
- name: cash_conversion_cycle_overview
  question: Show me cash conversion cycle. Where are my cash conversion cycle? Cash Conversion Cycle overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.DSO), 2) AS DSO,\n  ROUND(SUM(dl.DIO), 2) AS DIO,\n  ROUND(SUM(dl.DPO),\
    \ 2) AS DPO,\n  ROUND(SUM(dl.CCC), 2) AS CCC\nFROM dealer_db.dealer_db.VW_CASH_CONVERSION_CYCLE dl\nGROUP BY dl.DEALER_NAME\n\
    ORDER BY dl.DEALER_NAME;"
- name: cash_conversion_cycle_with_performance
  question: Show Cash Conversion Cycle with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    ROUND(SUM(dl.DSO), 2) AS DSO,\n    ROUND(SUM(dl.DIO), 2) AS DIO,\n\
    \    ROUND(SUM(dl.DPO), 2) AS DPO,\n    ROUND(SUM(dl.CCC), 2) AS CCC,\n  FROM dealer_db.dealer_db.VW_CASH_CONVERSION_CYCLE\
    \ dl\n  GROUP BY dl.DEALER_NAME\n),\nperf AS (\n  SELECT DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n\
    \    SUM(TOTAL_REVENUE) AS total_revenue\n  FROM dealer_db.dealer_db.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n\
    )\nSELECT b.*, ROUND(p.avg_margin,2) AS avg_gross_margin_pct, ROUND(p.total_revenue,0) AS total_revenue\nFROM base b\n\
    LEFT JOIN perf p ON b.DEALER_NAME = p.DEALER_NAME\nORDER BY p.total_revenue DESC NULLS LAST;"
- name: dealer_contribution_margin_overview
  question: Show me dealer contribution margin. Where are my dealer contribution margin? Dealer Contribution Margin overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.REVENUE_AMT), 2) AS REVENUE_AMT,\n  ROUND(SUM(dl.DIRECT_COSTS_AMT), 2) AS\
    \ DIRECT_COSTS_AMT,\n  ROUND(SUM(dl.ALLOCATED_COSTS_AMT), 2) AS ALLOCATED_COSTS_AMT,\n  ROUND(AVG(dl.CONTRIBUTION_MARGIN_PCT),\
    \ 2) AS CONTRIBUTION_MARGIN_PCT\nFROM dealer_db.dealer_db.VW_DEALER_CONTRIBUTION_MARGIN dl\nGROUP BY dl.DEALER_NAME\n\
    ORDER BY dl.DEALER_NAME;"
- name: dealer_contribution_margin_with_performance
  question: Show Dealer Contribution Margin with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    ROUND(SUM(dl.REVENUE_AMT), 2) AS REVENUE_AMT,\n    ROUND(SUM(dl.DIRECT_COSTS_AMT),\
    \ 2) AS DIRECT_COSTS_AMT,\n    ROUND(SUM(dl.ALLOCATED_COSTS_AMT), 2) AS ALLOCATED_COSTS_AMT,\n    ROUND(AVG(dl.CONTRIBUTION_MARGIN_PCT),\
    \ 2) AS CONTRIBUTION_MARGIN_PCT,\n  FROM dealer_db.dealer_db.VW_DEALER_CONTRIBUTION_MARGIN dl\n  GROUP BY dl.DEALER_NAME\n\
    ),\nperf AS (\n  SELECT DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n    SUM(TOTAL_REVENUE) AS total_revenue\n\
    \  FROM dealer_db.dealer_db.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n)\nSELECT b.*, ROUND(p.avg_margin,2) AS avg_gross_margin_pct,\
    \ ROUND(p.total_revenue,0) AS total_revenue\nFROM base b\nLEFT JOIN perf p ON b.DEALER_NAME = p.DEALER_NAME\nORDER BY\
    \ p.total_revenue DESC NULLS LAST;"
- name: dealer_journey_counts_overview
  question: Show me dealer journey counts. Where are my dealer journey counts? Dealer Journey Counts overview.
  use_as_onboarding_question: true
  sql: "SELECT\n  dl.DEALER_NAME,\n  ROUND(SUM(dl.TOTAL_ORDERS), 2) AS TOTAL_ORDERS,\n  ROUND(SUM(dl.ORDER_COUNT), 2) AS ORDER_COUNT,\n\
    \  ROUND(SUM(dl.DELIVERY_COUNT), 2) AS DELIVERY_COUNT,\n  ROUND(SUM(dl.INVOICE_COUNT), 2) AS INVOICE_COUNT,\n  ROUND(SUM(dl.PAID_COUNT),\
    \ 2) AS PAID_COUNT,\n  ROUND(SUM(dl.WARRANTY_COUNT), 2) AS WARRANTY_COUNT,\n  ROUND(SUM(dl.AVG_LEAD_TIME_DAYS), 2) AS\
    \ AVG_LEAD_TIME_DAYS,\n  ROUND(SUM(dl.ACTIVE_WARRANTY_COUNT), 2) AS ACTIVE_WARRANTY_COUNT,\n  ROUND(SUM(dl.EXPIRED_WARRANTY_COUNT),\
    \ 2) AS EXPIRED_WARRANTY_COUNT\nFROM dealer_db.dealer_db.VW_DEALER_JOURNEY_COUNTS dl\nGROUP BY dl.DEALER_NAME\nORDER BY\
    \ dl.DEALER_NAME;"
- name: dealer_journey_counts_with_performance
  question: Show Dealer Journey Counts with dealer performance.
  sql: "WITH base AS (\n  SELECT\n    dl.DEALER_NAME,\n    ROUND(SUM(dl.TOTAL_ORDERS), 2) AS TOTAL_ORDERS,\n    ROUND(SUM(dl.ORDER_COUNT),\
    \ 2) AS ORDER_COUNT,\n    ROUND(SUM(dl.DELIVERY_COUNT), 2) AS DELIVERY_COUNT,\n    ROUND(SUM(dl.INVOICE_COUNT), 2) AS\
    \ INVOICE_COUNT,\n    ROUND(SUM(dl.PAID_COUNT), 2) AS PAID_COUNT,\n    ROUND(SUM(dl.WARRANTY_COUNT), 2) AS WARRANTY_COUNT,\n\
    \    ROUND(SUM(dl.AVG_LEAD_TIME_DAYS), 2) AS AVG_LEAD_TIME_DAYS,\n    ROUND(SUM(dl.ACTIVE_WARRANTY_COUNT), 2) AS ACTIVE_WARRANTY_COUNT,\n\
    \    ROUND(SUM(dl.EXPIRED_WARRANTY_COUNT), 2) AS EXPIRED_WARRANTY_COUNT,\n  FROM dealer_db.dealer_db.VW_DEALER_JOURNEY_COUNTS\
    \ dl\n  GROUP BY dl.DEALER_NAME\n),\nperf AS (\n  SELECT DEALER_NAME,\n    AVG(GROSS_PROFIT_MARGIN_PCT) AS avg_margin,\n\
    \    SUM(TOTAL_REVENUE) AS total_revenue\n  FROM dealer_db.dealer_db.VW_GROSS_PROFIT_MARGIN\n  GROUP BY DEALER_NAME\n\
    )\nSELECT b.*, ROUND(p.avg_margin,2) AS avg_gross_margin_pct, ROUND(p.total_revenue,0) AS total_revenue\nFROM base b\n\
    LEFT JOIN perf p ON b.DEALER_NAME = p.DEALER_NAME\nORDER BY p.total_revenue DESC NULLS LAST;"
